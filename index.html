<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Storage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* বেসিক রিসেট এবং থিমিং (Navy Blue Theme) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a192f; /* Deep Navy Blue */
            color: #f4f6f9;
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        /* টপ হেডার ও সার্চ বার */
        header {
            background-color: #0f2647;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #00b4d8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background: #00b4d8;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .refresh-btn:hover {
            background: #0096c7;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-container input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border-radius: 25px;
            border: 1px solid #1e467a;
            background-color: #0a192f;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-container i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00b4d8;
            cursor: pointer;
        }

        /* ইংরেজি নোটিশ বক্স */
        .notice-box {
            background-color: rgba(0, 180, 216, 0.15);
            border-left: 4px solid #00b4d8;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #e0f2fe;
            font-weight: 500;
            text-align: center;
        }

        /* মেইন কন্টেন্ট বা শর্টস গ্রিড লেআউট */
        .main-content {
            padding: 15px;
        }

        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .short-card {
            background-color: #0f2647;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 9 / 16;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .short-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(transparent, rgba(10, 25, 47, 0.95));
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-stats {
            font-size: 11px;
            color: #94a3b8;
        }

        /* বটম নেভিগেশন বার */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #0f2647;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1e467a;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
            flex: 1;
            padding: 5px 0;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 3px;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #00b4d8;
        }

        .nav-item.active i {
            transform: scale(1.1);
        }

        /* প্লাস বাটনের জন্য বিশেষ স্টাইল */
        .upload-btn-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .plus-icon-style {
            font-size: 28px !important;
            color: #00b4d8;
        }

        /* অ্যাকাউন্ট ও অন্যান্য খালি পেজের ডেমো স্টাইল */
        .placeholder-page {
            text-align: center;
            padding: 50px 20px;
            color: #94a3b8;
        }
        
        .placeholder-page i {
            font-size: 50px;
            color: #00b4d8;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="app-title">
                <i class="fas fa-database"></i> Short Storage
            </div>
            <button class="refresh-btn" onclick="refreshVideos()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search short videos...">
            <i class="fas fa-search" onclick="searchVideos()"></i>
        </div>

        <div class="notice-box">
            <i class="fas fa-info-circle"></i> Only videos between 50s and 1:30s can be uploaded.
        </div>
    </header>

    <main class="main-content">

        <section id="home-page" class="page-section active">
            <div class="shorts-grid" id="videos-container">
                </div>
        </section>

        <section id="shorts-page" class="page-section">
            <div class="placeholder-page">
                <i class="fas fa-bolt"></i>
                <h2>Trending Shorts</h2>
                <p>Full-screen immersive shorts feed coming soon!</p>
            </div>
        </section>

        <section id="account-page" class="page-section">
            <div class="placeholder-page">
                <i class="fas fa-user-circle"></i>
                <h2>Your Profile</h2>
                <p>Manage your uploaded videos and channel settings details here.</p>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home-page', this)">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        
        <div class="nav-item" onclick="switchPage('shorts-page', this)">
            <i class="fas fa-bolt"></i>
            <span>Shorts</span>
        </div>
        
        <div class="nav-item upload-btn-wrapper">
            <i class="fas fa-plus-circle plus-icon-style"></i>
            <input type="file" id="video-uploader" accept="video/*" onchange="handleVideoUpload(event)">
        </div>
        
        <div class="nav-item" onclick="switchPage('account-page', this)">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </div>
    </nav>

    <script>
        // ডেমো ভিডিও ডাটাবেজ (প্লেসহোল্ডার ভিডিও লিংক সহ)
        const initialVideos = [
            { title: "Amazing Football Skills ⚽", views: "120K views", src: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { title: "Nature is Beautiful 🌿", views: "85K views", src: "https://www.w3schools.com/html/movie.mp4" },
            { title: "Coding Motivation 💻", views: "43K views", src: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { title: "Life Hacks you need! 💡", views: "910K views", src: "https://www.w3schools.com/html/movie.mp4" },
            { title: "Cutest Puppy ever 🐶", views: "1.2M views", src: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { title: "Fastest Car Review 🏎️", views: "300K views", src: "https://www.w3schools.com/html/movie.mp4" }
        ];

        // ভিডিও পেজে রেন্ডার করার ফাংশন
        function renderVideos(videoList) {
            const container = document.getElementById('videos-container');
            container.innerHTML = '';
            
            if(videoList.length === 0) {
                container.innerHTML = '<p style="grid-column: span 2; text-align:center; color:#94a3b8;">No videos found.</p>';
                return;
            }

            videoList.forEach(video => {
                const card = document.createElement('div');
                card.className = 'short-card';
                card.innerHTML = `
                    <video src="${video.src}" loop muted autoplay playsinline onclick="togglePlay(this)"></video>
                    <div class="video-overlay">
                        <div class="video-title">${video.title}</div>
                        <div class="video-stats">${video.views}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ভিডিও প্লে/পজ করার টগল
        function togglePlay(videoElement) {
            if (videoElement.paused) {
                videoElement.play();
            } else {
                videoElement.pause();
            }
        }

        // পেজ রিফ্রেশ করলে নতুন করে ভিডিও সাজানো (সব ওলটপালট/র্যান্ডম হবে)
        function refreshVideos() {
            const shuffled = [...initialVideos].sort(() => 0.5 - Math.random());
            renderVideos(shuffled);
        }

        // সার্চ অপশন লজিক
        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = initialVideos.filter(video => video.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        // ইনপুট বক্সে Enter চাপলে সার্চ হবে
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchVideos();
            }
        });

        // বটম মেনু পেজ পরিবর্তনের লজিক
        function switchPage(pageId, element) {
            // সব পেজ ইনঅ্যাক্টিভ করা
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            // নির্দিষ্ট পেজ অ্যাক্টিভ করা
            document.getElementById(pageId).classList.add('active');

            // অ্যাক্টিভ ক্লাসের কালার পরিবর্তন
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            if(element) element.classList.add('active');
        }

        // ভিডিও আপলোড ও সময়সীমা ভ্যালিডেশন লজিক (৫০ সেকেন্ড থেকে ১ মিনিট ৩০ সেকেন্ড)
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // এটি একটি ডামি ভিডিও এলিমেন্ট তৈরি করে ব্যাকগ্রাউন্ডে লেন্থ চেক করার জন্য
            const videoElement = document.createElement('video');
            videoElement.preload = 'metadata';

            videoElement.onloadedmetadata = function() {
                window.URL.revokeObjectURL(videoElement.src);
                const duration = videoElement.duration; // সেকেন্ডে হিসাব আসবে

                const minDuration = 50;         // ৫০ সেকেন্ড
                const maxDuration = 90;         // ১ মিনিট ৩০ সেকেন্ড = ৯০ সেকেন্ড

                if (duration >= minDuration && duration <= maxDuration) {
                    // সফল আপলোড মেসেজ ও ভিডিও লিস্টে যুক্ত করা (লোকালি টেস্টের জন্য)
                    alert("Success! Your short video is within the valid limit (50s - 1m 30s) and uploaded successfully.");
                    
                    // ডেমো হিসেবে হোমপেজের শুরুতে নতুন ভিডিওটি যুক্ত করে দেওয়া হচ্ছে
                    const newVideo = {
                        title: file.name.replace(/\.[^/.]+$/, ""), // এক্সটেনশন ছাড়া ফাইলের নাম
                        views: "0 views (Just now)",
                        src: URL.createObjectURL(file)
                    };
                    initialVideos.unshift(newVideo);
                    switchPage('home-page', document.querySelector('.nav-item')); // হোমে ফেরত নিয়ে যাবে
                    renderVideos(initialVideos);
                } else {
                    // শর্ত পূরণ না হলে আপলোড রিজেক্ট হবে
                    alert("Upload Failed! Video duration must be between 50 seconds and 1 minute 30 seconds. Your video was " + Math.round(duration) + " seconds.");
                }
            };

            videoElement.src = URL.createObjectURL(file);
        }

        // অ্যাপ চালু হওয়ার সময় প্রথমবার ভিডিও লোড করা
        window.onload = function() {
            renderVideos(initialVideos);
        };
    </script>
</body>
</html>
